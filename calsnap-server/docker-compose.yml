services:
  postgres:
    image: postgres:15-alpine
    container_name: calsnap-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ${DB_NAME:-calsnap}
      POSTGRES_USER: ${DB_USER:-calsnap}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-calsnap1234}
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: calsnap-pgadmin
    restart: unless-stopped
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@calsnap.com
      PGADMIN_DEFAULT_PASSWORD: admin1234
    depends_on:
      - postgres

volumes:
  pgdata:
